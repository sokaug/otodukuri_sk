<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>るーぷ・みゅーじっく（リアル生音源版）</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #121214; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        #start-screen { position: fixed; top:0; left:0; width:100vw; height:100vh; background: #121214; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .btn { background: #4ecca3; color: #121214; border: none; padding: 20px 40px; font-size: 24px; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 10px; box-shadow: 0 5px 15px rgba(78,204,163,0.3); width: 85%; max-width: 400px; text-align: center; }
        
        #mode-selection, #room-gate-student, #mode-teacher, #mode-student-inst-select { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 20px; text-align: center; position: absolute; top: 0; left: 0; width: 100vw; }
        .input-box { width: 100%; max-width: 300px; padding: 15px; font-size: 24px; text-align: center; border-radius: 12px; border: 3px solid #4ecca3; background: #2d2d35; color: white; margin-bottom: 15px; font-weight: bold; }
        
        .avatar-row { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .avatar-btn { font-size: 32px; background: #2d2d35; border: 3px solid transparent; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .avatar-btn.active { border-color: #4ecca3; background: #3e3e4a; transform: scale(1.1); }

        .control-bar { position: fixed; top: 0; left: 0; width: 100%; background: #1f1f23; display: flex; flex-direction: column; padding: 8px 12px; gap: 6px; z-index: 10; border-bottom: 2px solid #2d2d35; }
        .row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 6px; }
        
        .nav-btn { background: #3a3a40; color: white; border: none; padding: 8px 12px; font-size: 13px; border-radius: 8px; font-weight: bold; flex-shrink: 0; }
        .clear-btn { background: #e94560; color: white; border: none; padding: 8px 12px; font-size: 13px; border-radius: 8px; font-weight: bold; flex-shrink: 0; }
        
        .submit-btn-fixed { background: #fbd46d; color: #121214; border: none; padding: 10px 14px; font-size: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(251,212,109,0.3); display: none; flex-shrink: 0; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        #beat-indicator { display: flex; gap: 3px; justify-content: center; flex-grow: 1; min-width: 0; padding: 0 4px; }
        .beat-dot { width: 8px; height: 8px; background: #3a3a40; border-radius: 50%; transition: background-color 0.05s; flex-shrink: 1; }
        .beat-dot.active { background: #4ecca3; transform: scale(1.3); }
        .beat-dot.recorded { background: #e94560; }

        .inst-row { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; width: 100%; }
        .inst-btn { background: #3a3a40; color: white; border: none; padding: 12px 20px; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .inst-btn.active { background: #4ecca3; color: #121214; }

        .mode-container { display: none; width: 100vw; height: 100vh; position: relative; padding-top: 130px; }
        #mode-switch { background: #1a1c23; }
        #switch-pad { width: 85%; height: 65vh; margin: 5px auto; background: #e94560; border-radius: 40px; display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: bold; box-shadow: 0 10px 0 #b33046; }
        #switch-pad:active { transform: translateY(6px); box-shadow: 0 4px 0 #b33046; }
        #mode-trace { background: #161920; }
        #trace-area { width: 90%; height: 65vh; margin: 5px auto; background: #222633; border: 4px dashed #4ecca3; border-radius: 20px; display: flex; justify-content: center; align-items: center; font-size: 22px; color: #6c7a9c; text-align: center; padding: 15px; }
        
        #mode-teacher { background: #121214; display: none; flex-direction: column; justify-content: flex-start; align-items: center; height: 100vh; padding-top: 120px; }
        .stage-container { width: 95%; max-width: 900px; height: 68vh; background: #1e1e24; border-radius: 24px; border: 3px solid #3a3a40; position: relative; overflow-y: auto; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 20px; padding: 20px; }
        
        .concert-card { display: flex; flex-direction: column; align-items: center; width: 110px; position: relative; transition: transform 0.1s ease-out; }
        .concert-avatar { font-size: 50px; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.5)); transition: transform 0.05s ease-out; }
        .concert-name { font-weight: bold; font-size: 12px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 20px; margin-top: 6px; border: 1px solid #4ecca3; text-align: center; white-space: nowrap; }
        .concert-inst { font-size: 10px; color: #aaa; margin-top: 2px; }
    </style>
    <!-- 音響コアライブラリ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

    <div class="control-bar" id="global-controls" style="display: none;">
        <div class="row">
            <button class="submit-btn-fixed" id="submit-btn" onclick="submitLoopToTeacher()">📤 せんせいにおくる</button>
            <button class="nav-btn" id="back-nav-btn" onclick="handleBackOrClose()">🔙 もどる</button>
            <div id="beat-indicator">
                <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
                <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
                <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
                <div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div><div class="beat-dot"></div>
            </div>
            <button class="clear-btn" id="clear-btn" onclick="clearCurrentLoop()">↩️ けす</button>
        </div>
        <div class="row" style="justify-content: center; font-weight: bold; font-size: 12px;" id="room-title-text">
            えんそく中
        </div>
    </div>

    <div id="start-screen">
        <h1 style="font-size: 30px; text-align: center; margin-bottom: 5px; color:#4ecca3;">るーぷ・みゅーじっく</h1>
        <p style="color: #888; margin-bottom: 40px;">〜 完全リアル生音源シアター 〜</p>
        <button class="btn" onclick="initAudio()">あぷりを はじめる</button>
    </div>

    <div id="mode-selection">
        <h2 style="margin-bottom: 30px; font-size: 22px;">どちらを 開きますか？</h2>
        <button class="btn" style="background:#4ecca3; color:#121214;" onclick="setupTeacherRoom()">👨‍🏫 先生用（みんなの演奏を合奏する）</button>
        <button class="btn" style="background:#e94560; color:#fff;" onclick="showStudentGate()">👶 子ども用（がっきをつくる）</button>
    </div>

    <div id="room-gate-student">
        <h2 style="font-size: 22px;">ルームに さんかする</h2>
        <input type="text" id="student-code-input" class="input-box" placeholder="コードをいれてね" maxLength="6">
        <input type="text" id="student-name-input" class="input-box" placeholder="なまえをいれてね">
        
        <p style="margin: 5px 0 10px 0; color: #aaa; font-weight: bold; font-size: 14px;">好きなキャラクターをえらんでね</p>
        <div class="avatar-row">
            <button class="avatar-btn active" onclick="selectAvatar(this, '🐶')">🐶</button>
            <button class="avatar-btn" onclick="selectAvatar(this, '🐱')">🐱</button>
            <button class="avatar-btn" onclick="selectAvatar(this, '🐰')">🐰</button>
            <button class="avatar-btn" onclick="selectAvatar(this, '🐻')">🐻</button>
        </div>

        <button class="btn" style="background:#4ecca3; color:#121214;" onclick="joinStudentRoom()">✨ がっきをえらぶ画面へ</button>
        <button class="btn" style="background:#3a3a40; color:#fff; font-size:18px;" onclick="location.reload()">🔙 もどる</button>
    </div>

    <div id="mode-teacher">
        <h2 style="margin: 0; color: #fff; font-size: 20px;">🎵 みんなで作ったループ合奏 🎵</h2>
        <div class="stage-container" id="theater-stage">
            <div style="color:#666; padding:40px; font-size:16px;">子どもたちからの提出をまっています...</div>
        </div>
        <button class="btn" style="background:#e94560; color:#fff; margin-top:15px; font-size:14px; padding:10px 20px; width:180px;" onclick="if(confirm('全員の提出をリセットしますか？')){location.reload();}">🧹 演奏をクリアする</button>
    </div>

    <div id="mode-student-inst-select">
        <h2 style="font-size: 20px;">どのがっきの おとにしますか？</h2>
        <div class="inst-row">
            <button id="bi-drum" class="inst-btn active" onclick="changeInstrument('drum')">🥁 たいこ</button>
            <button id="bi-piano" class="inst-btn" onclick="changeInstrument('piano')">🎹 ピアノ</button>
            <button id="bi-bell" class="inst-btn" onclick="changeInstrument('bell')">🔔 かね</button>
        </div>
        <h2 style="font-size: 20px;">どうやって えんそくする？</h2>
        <button class="btn" style="background:#e94560;" onclick="startPlayMode('switch')">🔴 スイッチ（音に合わせて弾む！）</button>
        <button class="btn" style="background:#00adb5;" onclick="startPlayMode('trace')">✨ なぞる（メロディに合わせて動く！）</button>
    </div>

    <div id="mode-switch" class="mode-container">
        <div id="switch-pad" onpointerdown="recordSwitchSound(event)">ここを おす！</div>
    </div>

    <div id="mode-trace" class="mode-container">
        <div id="trace-area">がめんを ゆびで なぞってみてね ✨</div>
    </div>

    <script>
        window.scale = ["C3", "D3", "E3", "G3", "A3", "C4", "D4", "E4", "G4", "A4"];
        window.currentInstrument = 'drum';
        window.currentRole = ''; 
        window.roomCode = '';
        window.studentName = '';
        window.selectedAvatar = '🐶';
        window.selectedMode = 'switch';

        let drumSampler, pianoSampler, bellSampler, ws;
        let isInitialized = false;
        let activeStep = 0;

        window.mySwitchLoop = Array(16).fill(false);
        window.myTraceLoop = Array(16).fill(null);
        window.allStudentsData = {};

        function initWebSocket() {
            ws = new WebSocket("wss://echo.websocket.org/.wss");
            ws.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.room === window.roomCode && window.currentRole === 'teacher' && msg.type === 'submit') {
                        window.allStudentsData[msg.name] = msg.data;
                        updateTeacherTheaterUI();
                    }
                } catch(e) {}
            };
            ws.onclose = function() { setTimeout(initWebSocket, 2000); };
        }

        window.initAudio = function() {
            if (isInitialized) return;
            Tone.start();
            Tone.Transport.bpm.value = 90;

            // 🎵 全楽器をオープンな本物の生音オーディオファイル（サンプラー）に完全移行
            drumSampler = new Tone.Sampler({
                urls: { C2: "taiko.mp3", C3: "taiko.mp3" },
                baseUrl: "https://philharmonia.co.uk/apps/sound-samples/audio/percussion/taiko/",
                onload: () => console.log("Taiko loaded")
            }).toDestination();

            pianoSampler = new Tone.Sampler({
                urls: { C3: "C3.mp3", C4: "C4.mp3", A4: "A4.mp3" },
                baseUrl: "https://tonejs.github.io/audio/salamander/",
                onload: () => console.log("Piano loaded")
            }).toDestination();

            bellSampler = new Tone.Sampler({
                urls: { C4: "glockenspiel-c4.mp3", C5: "glockenspiel-c5.mp3" },
                baseUrl: "https://tonejs.github.io/audio/casio/",
                onload: () => console.log("Bell loaded")
            }).toDestination();

            Tone.Transport.scheduleRepeat((time) => {
                let step = activeStep;
                
                Tone.Draw.schedule(() => {
                    const dots = document.querySelectorAll('.beat-dot');
                    dots.forEach((dot, idx) => {
                        dot.classList.remove('active');
                        if (idx === step) dot.classList.add('active');
                        if (window.currentRole === 'student' && (window.mySwitchLoop[idx] || window.myTraceLoop[idx])) dot.classList.add('recorded');
                        else if (window.currentRole === 'student') dot.classList.remove('recorded');
                    });

                    if (window.currentRole === 'teacher') {
                        Object.keys(window.allStudentsData).forEach(k => {
                            const student = window.allStudentsData[k];
                            const card = document.getElementById(`card-${student.studentName}`);
                            const avatarEl = document.getElementById(`avatar-${student.studentName}`);
                            if (!card || !avatarEl) return;

                            if (student.mode === 'switch' && student.switchLoop && student.switchLoop[step]) {
                                avatarEl.style.transform = "scale(1.4) translateY(-25px)";
                                card.style.borderColor = "#4ecca3";
                                setTimeout(() => { avatarEl.style.transform = "scale(1) translateY(0px)"; card.style.borderColor = "transparent"; }, 150);
                            }
                            if (student.mode === 'trace' && student.traceLoop && student.traceLoop[step]) {
                                const noteIdx = window.scale.indexOf(student.traceLoop[step]);
                                if (noteIdx !== -1) {
                                    const yOffset = (noteIdx - 5) * -10; 
                                    avatarEl.style.transform = `translateY(${yOffset}px) scale(1.1)`;
                                    setTimeout(() => avatarEl.style.transform = `translateY(${yOffset}px) scale(1)`, 100);
                                }
                            }
                        });
                    }
                }, time);

                // 各ステップでの生音再生
                if (window.currentRole === 'student') {
                    if (window.mySwitchLoop[step]) drumSampler.triggerAttackRelease("C2", "4n", time);
                    if (window.myTraceLoop[step]) {
                        if (window.currentInstrument === 'piano') pianoSampler.triggerAttackRelease(window.myTraceLoop[step], "16n", time);
                        else if (window.currentInstrument === 'bell') bellSampler.triggerAttackRelease(window.myTraceLoop[step], "16n", time);
                        else drumSampler.triggerAttackRelease("C2", "4n", time);
                    }
                } else if (window.currentRole === 'teacher') {
                    Object.values(window.allStudentsData).forEach(student => {
                        if (student.switchLoop && student.switchLoop[step]) drumSampler.triggerAttackRelease("C2", "4n", time);
                        if (student.traceLoop && student.traceLoop[step]) {
                            if (student.instrument === 'piano') pianoSampler.triggerAttackRelease(student.traceLoop[step], "16n", time);
                            else if (student.instrument === 'bell') bellSampler.triggerAttackRelease(student.traceLoop[step], "16n", time);
                            else drumSampler.triggerAttackRelease("C2", "4n", time);
                        }
                    });
                }
                activeStep = (activeStep + 1) % 16;
            }, "16n");

            Tone.Transport.start();
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("mode-selection").style.display = "flex";
            isInitialized = true;
            initWebSocket();
        };

        window.setupTeacherRoom = function() {
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            window.roomCode = code;
            window.currentRole = 'teacher';
            document.getElementById("mode-selection").style.display = "none";
            document.getElementById("mode-teacher").style.display = "flex";
            document.getElementById("global-controls").style.display = "flex";
            document.getElementById("clear-btn").style.display = "none";
            document.getElementById("submit-btn").style.display = "none";
            document.getElementById("room-title-text").innerHTML = `合奏シアター <span style="color:#4ecca3; font-size:20px; margin-left:10px;">コード: ${code}</span>`;
        };

        window.joinStudentRoom = function() {
            const codeInput = document.getElementById("student-code-input").value.toUpperCase();
            const nameInput = document.getElementById("student-name-input").value.trim();
            if (!codeInput || !nameInput) { alert("コードとなまえを いれてね！"); return; }
            window.roomCode = codeInput; window.studentName = nameInput; window.currentRole = 'student';
            document.getElementById("room-gate-student").style.display = "none";
            document.getElementById("global-controls").style.display = "flex";
            document.getElementById("room-title-text").innerHTML = `${window.selectedAvatar} ${nameInput}さんのがっき`;
            showInstrumentSelect();
        };

        window.submitLoopToTeacher = function() {
            if (window.currentRole !== 'student' || !window.roomCode || !ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({
                room: window.roomCode, type: 'submit', name: window.studentName,
                data: { studentName: window.studentName, avatar: window.selectedAvatar, instrument: window.currentInstrument, mode: window.selectedMode, switchLoop: window.mySwitchLoop, traceLoop: window.myTraceLoop }
            }));
            alert("せんせいにおくったよ！🎉");
            location.reload();
        };

        window.selectAvatar = function(element, avatar) {
            document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('active'));
            element.classList.add('active'); window.selectedAvatar = avatar;
        };
        function showStudentGate() { document.getElementById("mode-selection").style.display = "none"; document.getElementById("room-gate-student").style.display = "flex"; }
        function showInstrumentSelect() {
            document.querySelectorAll('.mode-container').forEach(c => c.style.display = 'none');
            document.getElementById("mode-teacher").style.display = "none"; 
            document.getElementById("submit-btn").style.display = "none"; 
            document.getElementById("mode-student-inst-select").style.display = "flex"; document.getElementById("clear-btn").style.display = "none";
            document.getElementById("back-nav-btn").innerText = "🔙 もどる";
        }
        window.changeInstrument = function(inst) {
            window.currentInstrument = inst;
            document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`bi-${inst}`).classList.add('active');
        };
        
        window.startPlayMode = function(playMode) {
            window.selectedMode = playMode;
            document.getElementById("mode-student-inst-select").style.display = "none";
            document.getElementById("clear-btn").style.display = "block"; 
            document.getElementById("submit-btn").style.display = "block"; 
            document.getElementById("back-nav-btn").innerText = "🔧 かえる";
            document.getElementById(playMode === 'switch' ? "mode-switch" : "mode-trace").style.display = "block";
            if (playMode === 'trace') setupTraceInput();
        };
        
        window.clearCurrentLoop = function() { window.mySwitchLoop.fill(false); window.myTraceLoop.fill(null); alert("えんそうを ゼロ にもどしたよ！"); };
        window.handleBackOrClose = function() { if (window.currentRole === 'teacher') { if(confirm("合奏を終了しますか？")) { location.reload(); } } else { showInstrumentSelect(); } };
        window.recordSwitchSound = function(e) { e.preventDefault(); drumSampler.triggerAttackRelease("C2", "4n"); window.mySwitchLoop[activeStep] = true; };
        window.recordTraceSound = function(note) {
            if (window.currentInstrument === 'piano') pianoSampler.triggerAttackRelease(note, "16n");
            else if (window.currentInstrument === 'bell') bellSampler.triggerAttackRelease(note, "16n");
            else drumSampler.triggerAttackRelease("C2", "4n");
            window.myTraceLoop[activeStep] = note;
        };
        function setupTraceInput() {
            const area = document.getElementById("trace-area");
            let onTrace = (e) => {
                let pointer = e.touches ? e.touches[0] : e; if (!pointer) return;
                let idx = Math.floor((pointer.clientX / window.innerWidth) * window.scale.length);
                idx = Math.max(0, Math.min(idx, window.scale.length - 1));
                window.recordTraceSound(window.scale[idx]);
            };
            area.onpointerdown = (e) => { e.preventDefault(); onTrace(e); };
            area.onpointermove = (e) => { if(e.buttons > 0 || e.touches) { e.preventDefault(); onTrace(e); } };
        }
        function updateTeacherTheaterUI() {
            const stageEl = document.getElementById("theater-stage"); stageEl.innerHTML = "";
            const keys = Object.keys(window.allStudentsData);
            if(keys.length === 0) { stageEl.innerHTML = `<div style="color:#666; padding:40px; font-size:16px;">子どもたちからの提出をまっています...</div>`; return; }
            keys.forEach(k => {
                const s = window.allStudentsData[k]; const card = document.createElement("div");
                card.className = "concert-card"; card.id = `card-${s.studentName}`;
                let instEmoji = s.instrument === 'drum' ? '🥁' : s.instrument === 'piano' ? '🎹' : '🔔';
                card.innerHTML = `<div class="concert-avatar" id="avatar-${s.studentName}">${s.avatar || '🐶'}</div><div class="concert-name">${s.studentName} さん</div><div class="concert-inst">${instEmoji} ${s.mode === 'switch' ? '（タップ）' : '（なぞる）'}</div>`;
                stageEl.appendChild(card);
            });
        }
    </script>
</body>
</html>
